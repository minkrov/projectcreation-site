<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sign In | ProjectCreation</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Geist:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-lowest": "#0e0e0e",
            "error-container": "#93000a",
            "background": "#131313",
            "outline-variant": "#37444b",
            "surface-container-low": "#1b1b1b",
            "surface-container-highest": "#353535",
            "on-surface-variant": "#b2c7d6",
            "error": "#ffb4ab",
            "primary": "#e5f5ff",
            "on-surface": "#e2e2e2",
            "primary-container": "#2aa8ff",
            "surface-container-high": "#2a2a2a",
            "surface": "#131313",
            "on-background": "#e2e2e2",
            "outline": "#7e9096",
            "surface-container": "#1f1f1f",
            "on-primary": "#003907",
            "primary-fixed": "#70c8ff",
            "primary-fixed-dim": "#2aa8ff",
            "surface-dim": "#131313"
          },
          "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          "spacing": {
            "xl": "64px", "md": "24px", "xs": "8px", "lg": "40px",
            "margin-mobile": "20px", "gutter": "1px", "sm": "16px",
            "margin-desktop": "48px", "base": "4px"
          },
          "fontFamily": {
            "headline-lg": ["Space Mono"], "headline-sm": ["Space Mono"],
            "headline-md": ["Space Mono"], "label-md": ["JetBrains Mono"],
            "body-lg": ["Geist"], "headline-lg-mobile": ["Space Mono"],
            "label-sm": ["JetBrains Mono"], "body-md": ["Geist"]
          },
          "fontSize": {
            "headline-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
            "headline-sm": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #131313;
      background-image:
        linear-gradient(rgba(42, 168, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42, 168, 255, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 30px #0e0e0e inset !important;
      -webkit-text-fill-color: #e2e2e2 !important;
      caret-color: #e2e2e2;
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-x-hidden">

  <header class="bg-background border-b border-outline-variant sticky top-0 z-50">
    <nav class="flex justify-between items-center w-full px-margin-desktop py-base">
      <a href="/" class="font-headline-sm text-headline-sm font-bold text-on-background tracking-tighter no-underline hover:text-primary-fixed-dim transition-colors">
        ProjectCreation
      </a>
      <a href="/signup.html" class="font-label-md text-label-md text-primary-fixed-dim hover:text-primary transition-colors">
        Create account →
      </a>
    </nav>
  </header>

  <main class="flex items-center justify-center min-h-[calc(100vh-57px)] px-margin-mobile py-xl">
    <div class="w-full max-w-md">

      <div class="border border-outline-variant bg-surface-container p-md md:p-xl">

        <div class="mb-lg">
          <div class="flex items-center gap-xs mb-sm">
            <div class="w-2 h-2 bg-primary-fixed-dim animate-pulse"></div>
            <span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Auth_Login.exe</span>
          </div>
          <h1 class="font-headline-md text-headline-md text-on-background">Sign In</h1>
          <p class="font-body-md text-body-md text-on-surface-variant mt-xs">
            Welcome back. Enter your credentials to access your account.
          </p>
        </div>

        <form id="loginForm" class="flex flex-col gap-sm" novalidate autocomplete="off">

          <div class="flex flex-col gap-1">
            <label for="email" class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Email</label>
            <input
              id="email" type="email" required autocomplete="email"
              class="bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md px-sm py-xs focus:outline-none focus:border-primary-fixed-dim transition-colors w-full"
              placeholder="you@example.com"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="password" class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Password</label>
            <input
              id="password" type="password" required autocomplete="current-password"
              class="bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md px-sm py-xs focus:outline-none focus:border-primary-fixed-dim transition-colors w-full"
              placeholder="Your password"
            />
          </div>

          <div id="errorMsg" class="hidden font-label-sm text-label-sm text-error border border-error-container bg-error-container/10 px-sm py-xs mt-xs"></div>

          <button
            id="submitBtn" type="submit"
            class="mt-sm w-full bg-primary-container text-on-primary border border-primary-container font-label-md text-label-md px-md py-sm hover:bg-transparent hover:text-primary-container transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          >
            AUTHENTICATE
          </button>

        </form>

        <p class="mt-md font-label-sm text-label-sm text-on-surface-variant text-center">
          Don't have an account?
          <a href="/signup.html" class="text-primary-fixed-dim hover:text-primary transition-colors ml-1">Create one</a>
        </p>

      </div>

      <p class="mt-sm font-label-sm text-label-sm text-outline text-center">
        © 2024 ProjectCreation. Engineered for Digital Craft.
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4/dist/umd/supabase.min.js" integrity="sha384-4eCDoMN/7A46qQ5Tj0rZ/D2VEolFGNIINDTLAcWZcvhkRSsvTfqNfaBMlRRoGEZ5" crossorigin="anonymous"></script>
  <script>
    (() => {
      const { createClient } = supabase;
      const db = createClient(
        'https://gohyhxqvcjdthxvpewrx.supabase.co',
        'sb_publishable_rBSID_xnOICGEpVQWPW8KA_FYFSdoS1'
      );

      // Redirect if already authenticated
      db.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.replace('/account.html');
      });

      const form      = document.getElementById('loginForm');
      const errorMsg  = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.add('hidden');

        const email    = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          errorMsg.textContent = 'Email and password are required.';
          errorMsg.classList.remove('hidden');
          return;
        }

        submitBtn.textContent = 'AUTHENTICATING...';
        submitBtn.disabled = true;

        const { error } = await db.auth.signInWithPassword({ email, password });

        if (error) {
          // Generic message — do not reveal whether email exists
          errorMsg.textContent = 'Invalid credentials. Please check your email and password.';
          errorMsg.classList.remove('hidden');
          submitBtn.textContent = 'AUTHENTICATE';
          submitBtn.disabled = false;
          return;
        }

        window.location.replace('/account.html');
      });
    })();
  </script>
</body>
</html>
