<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Account | ProjectCreation</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Geist:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-lowest": "#0e0e0e",
            "error-container": "#93000a",
            "background": "#131313",
            "outline-variant": "#37444b",
            "surface-container-low": "#1b1b1b",
            "surface-container-highest": "#353535",
            "on-surface-variant": "#b2c7d6",
            "error": "#ffb4ab",
            "primary": "#e5f5ff",
            "on-surface": "#e2e2e2",
            "primary-container": "#2aa8ff",
            "surface-container-high": "#2a2a2a",
            "surface": "#131313",
            "on-background": "#e2e2e2",
            "outline": "#7e9096",
            "surface-container": "#1f1f1f",
            "on-primary": "#003907",
            "primary-fixed": "#70c8ff",
            "primary-fixed-dim": "#2aa8ff",
            "surface-dim": "#131313"
          },
          "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          "spacing": {
            "xl": "64px", "md": "24px", "xs": "8px", "lg": "40px",
            "margin-mobile": "20px", "gutter": "1px", "sm": "16px",
            "margin-desktop": "48px", "base": "4px"
          },
          "fontFamily": {
            "headline-lg": ["Space Mono"], "headline-sm": ["Space Mono"],
            "headline-md": ["Space Mono"], "label-md": ["JetBrains Mono"],
            "body-lg": ["Geist"], "headline-lg-mobile": ["Space Mono"],
            "label-sm": ["JetBrains Mono"], "body-md": ["Geist"]
          },
          "fontSize": {
            "headline-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
            "headline-sm": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #131313;
      background-image:
        linear-gradient(rgba(42, 168, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42, 168, 255, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-x-hidden">

  <header class="bg-background border-b border-outline-variant sticky top-0 z-50">
    <nav class="flex justify-between items-center w-full px-margin-desktop py-base">
      <a href="/" class="font-headline-sm text-headline-sm font-bold text-on-background tracking-tighter no-underline hover:text-primary-fixed-dim transition-colors">
        ProjectCreation
      </a>
      <button
        id="signOutBtn"
        class="font-label-md text-label-md text-on-surface-variant hover:text-error transition-colors"
      >
        Sign out
      </button>
    </nav>
  </header>

  <main class="px-margin-mobile md:px-margin-desktop py-xl">

    <!-- Account header -->
    <div class="mb-xl">
      <div class="flex items-center gap-xs mb-sm">
        <div class="w-2 h-2 bg-primary-fixed-dim animate-pulse"></div>
        <span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Session_Active</span>
      </div>
      <h1 class="font-headline-md text-headline-md text-on-background">Account</h1>
      <p class="font-body-md text-body-md text-on-surface-variant mt-xs">
        Signed in as <span id="userEmail" class="text-primary-fixed-dim font-bold"></span>
      </p>
    </div>

    <!-- Status card -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-md mb-xl">
      <div class="border border-outline-variant bg-surface-container p-md">
        <span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Status</span>
        <div class="flex items-center gap-xs mt-sm">
          <div class="w-2 h-2 bg-primary-fixed-dim rounded-full animate-pulse"></div>
          <span class="font-headline-sm text-headline-sm text-on-background">Active</span>
        </div>
        <p class="font-label-sm text-label-sm text-outline mt-xs">Account verified and operational.</p>
      </div>

      <div class="border border-outline-variant bg-surface-container p-md">
        <span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Account ID</span>
        <p id="userId" class="font-label-sm text-label-sm text-on-surface mt-sm break-all font-mono opacity-60">—</p>
      </div>

      <div class="border border-outline-variant bg-surface-container p-md">
        <span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Member Since</span>
        <p id="memberSince" class="font-headline-sm text-headline-sm text-on-background mt-sm">—</p>
        <p class="font-label-sm text-label-sm text-outline mt-xs">Account creation date.</p>
      </div>
    </div>

    <!-- Projects placeholder -->
    <div class="border border-outline-variant bg-surface-container-lowest p-md md:p-xl">
      <div class="flex items-center gap-xs mb-sm">
        <span class="material-symbols-outlined text-primary-fixed-dim">folder_open</span>
        <span class="font-label-sm text-label-sm text-primary-fixed-dim uppercase tracking-widest">Projects</span>
      </div>
      <h2 class="font-headline-sm text-headline-sm text-on-background mb-xs">Your Projects</h2>
      <p class="font-body-md text-body-md text-on-surface-variant font-mono">
        Projects section coming soon. Your apps and tools will appear here.
      </p>
      <div class="mt-md border border-outline-variant border-dashed p-md flex items-center justify-center opacity-40">
        <span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">No projects yet</span>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (() => {
      const { createClient } = supabase;
      const db = createClient(
        'https://gohyhxqvcjdthxvpewrx.supabase.co',
        'sb_publishable_rBSID_xnOICGEpVQWPW8KA_FYFSdoS1'
      );

      // Guard: must be authenticated
      db.auth.getSession().then(({ data: { session } }) => {
        if (!session) {
          window.location.replace('/login.html');
          return;
        }

        const user = session.user;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userId').textContent = user.id;

        const created = new Date(user.created_at);
        document.getElementById('memberSince').textContent =
          created.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
      });

      // Listen for auth changes (e.g. session expiry)
      db.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT' || !session) {
          window.location.replace('/login.html');
        }
      });

      // Sign out
      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await db.auth.signOut();
        window.location.replace('/login.html');
      });
    })();
  </script>
</body>
</html>
