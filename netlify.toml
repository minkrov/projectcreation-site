# ============================================================
# ProjectCreation — Netlify Security Configuration
# ============================================================

# --- Security headers for every response ---
[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for 2 years, include subdomains, allow preload list submission
    Strict-Transport-Security       = "max-age=63072000; includeSubDomains; preload"
    # Prevent MIME-type sniffing
    X-Content-Type-Options          = "nosniff"
    # Deny all framing — belt-and-suspenders with CSP frame-ancestors
    X-Frame-Options                 = "DENY"
    # Block Flash/Silverlight cross-domain policies
    X-Permitted-Cross-Domain-Policies = "none"
    # Only send origin on cross-origin requests (no full URL)
    Referrer-Policy                 = "strict-origin-when-cross-origin"
    # Disable all browser features we don't use
    Permissions-Policy              = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    # Isolate this browsing context — prevents Spectre-class leaks
    Cross-Origin-Opener-Policy      = "same-origin"
    # Content Security Policy
    # default-src 'none' = deny everything not explicitly listed
    # script-src: inline scripts (Tailwind config) + two CDN hosts only
    # style-src: inline styles + Google Fonts CSS
    # font-src: Google Fonts files only
    # img-src: local assets and data URIs only
    # connect-src: ONLY our specific Supabase project — no wildcards
    # frame-ancestors 'none': prevents all embedding/clickjacking
    # base-uri 'self': prevents base-tag injection attacks
    # form-action 'self': prevents forms from submitting to external sites
    # object-src 'none': blocks Flash, Java, and plugins entirely
    # worker-src 'none': blocks service worker registration
    Content-Security-Policy = "default-src 'none'; script-src 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src https://gohyhxqvcjdthxvpewrx.supabase.co wss://gohyhxqvcjdthxvpewrx.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; worker-src 'none';"

# --- HTML pages must never be cached by browsers or CDN ---
# Prevents stale authenticated state being served from cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Cross-Origin-Resource-Policy = "same-origin"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Cross-Origin-Resource-Policy = "same-origin"

# --- Static assets: cache aggressively (content-addressed by filename) ---
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Cross-Origin-Resource-Policy = "same-site"
